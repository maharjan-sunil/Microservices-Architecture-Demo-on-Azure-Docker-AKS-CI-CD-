name: Build, Push Docker Image and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_name: ${{ steps.set-vars.outputs.IMAGE_NAME }} # Expose the variable
    steps:
      # -----------------------
      # 1️⃣ Checkout code
      # -----------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------
      # 2️⃣ Login to Azure (for ACR and AKS)
      # -----------------------
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -----------------------
      # 3️⃣ Set variables
      # -----------------------
      - name: Set variables
        run: |
          ACR_NAME="dk8sdemo"
          IMG="$ACR_NAME.azurecr.io/dockerdemo:${{ github.sha }}"
          echo "IMAGE_NAME=$IMG" >> $GITHUB_OUTPUT # Set as output
          echo "IMAGE_NAME=$IMG" >> $GITHUB_ENV    # Keep for current job

      # -----------------------
      # 4️⃣ Build Docker image
      # -----------------------
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      # -----------------------
      # 5️⃣ Push to ACR
      # -----------------------
      - name: Push to ACR
        run: |
          echo "Logging in to ACR..."
          az acr login --name $ACR_NAME
          docker push $IMAGE_NAME

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      # Pull the value from the build job's output
      IMAGE_NAME: ${{ needs.build.outputs.image_name }} 
    steps:
      # -----------------------
      # 1️⃣ Checkout code
      # -----------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -----------------------
      # 2️⃣ Login to Azure
      # -----------------------
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # -----------------------
      # 3️⃣ Get AKS Credentials
      # -----------------------
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group Dockerdemo_group \
            --name dockerdk8s \
            --overwrite-existing

      # -----------------------
      # 4️⃣ Update image in Deployment YAML
      # -----------------------
      - name: Update image in deployment.yaml
        run: |
          # Now $IMAGE_NAME will have the correct value
          sed -i "s|image: .*|image: $IMAGE_NAME|g" k8s/deployment.yaml

      # -----------------------
      # 5️⃣ Apply Kubernetes manifests
      # -----------------------
      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/