name: Build, Push Docker Image and Deploy to AKS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACR_NAME: ${{ secrets.ACR_NAME }}
    outputs:
      image_name: ${{ steps.set-vars.outputs.IMAGE_NAME }}

    steps:

      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Login to Azure
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3️⃣ Set image name
      - name: Set variables
        id: set-vars
        run: |
          IMG="$ACR_NAME.azurecr.io/dockerdemo:${{ github.sha }}"
          echo "IMAGE_NAME=$IMG" >> $GITHUB_OUTPUT
          echo "IMAGE_NAME=$IMG" >> $GITHUB_ENV

      # 4️⃣ Build Docker image
      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_NAME .

      # 5️⃣ Push image to ACR
      - name: Push to ACR
        run: |
          az acr login --name "$ACR_NAME"
          docker push $IMAGE_NAME

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      IMAGE_NAME: ${{ needs.build.outputs.image_name }}

    steps:

      # 1️⃣ Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Login to Azure
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 3️⃣ Get AKS credentials
      - name: Get AKS Credentials
        run: |
          az aks get-credentials \
            --resource-group Dockerdemo_group \
            --name dockerdk8s \
            --overwrite-existing

      # 4️⃣ Update deployment image directly
      - name: Update deployment image
        run: |
          kubectl set image deployment/dockerdemo-api \
          dockerdemo-api=$IMAGE_NAME

      # 5️⃣ Verify rollout
      - name: Verify deployment rollout
        run: |
          kubectl rollout status deployment/dockerdemo-api